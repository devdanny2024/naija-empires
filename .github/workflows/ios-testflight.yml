name: iOS TestFlight

# Manual trigger (Actions tab → Run workflow) or push a tag like ios-v0.1
on:
  workflow_dispatch:
  push:
    tags: ['ios-*']

jobs:
  build:
    name: Build Unity iOS (Xcode project)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: unity-m0/Library
          key: Library-iOS-${{ hashFiles('unity-m0/Assets/**', 'unity-m0/Packages/**', 'unity-m0/ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-

      - name: Build iOS Xcode project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity-m0
          targetPlatform: iOS
          buildName: NaijaEmpires

      - name: Upload Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode
          path: build/iOS

  release:
    name: Archive & upload to TestFlight
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ios-xcode
          path: build/iOS

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Upload to TestFlight (fastlane)
        env:
          APP_STORE_CONNECT_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY:       ${{ secrets.APP_STORE_CONNECT_KEY }}   # base64 of the .p8
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane ios beta
